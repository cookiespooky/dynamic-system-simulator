<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#07090d" />
  <title>Dynamic System Simulator</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <canvas id="world"></canvas>
  <header class="hud top">
    <div class="brand"><strong>DSS</strong><select id="lensSelect" aria-label="Линза"></select><span id="stepLabel">STEP 0</span></div>
    <button id="resetBtn">Reset</button>
  </header>
  <aside id="stats" class="panel"></aside>
  <div id="timeline" class="timeline">Ожидание первого анализа…</div>
  <section id="sheet" class="sheet hidden">
    <div class="grab"></div>
    <div class="sheet-head"><strong>Вмешательство</strong><button id="closeSheet">×</button></div>
    <label><span id="interventionLabel">P₁ delta</span><input id="deltaP1" type="range" min="-0.5" max="0.5" value="0.2" step="0.01"><output id="deltaOut">+0.20</output></label>
    <button id="applyIntervention" class="primary">Применить к выбранному узлу</button>
  </section>
  <nav class="controls">
    <button id="stepBtn" aria-label="Step">│▶</button>
    <button id="playBtn" class="primary" aria-label="Play pause">▶</button>
    <button id="speedBtn" aria-label="Speed">×1</button>
    <button id="interveneBtn" aria-label="Intervention">±</button>
  </nav>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
