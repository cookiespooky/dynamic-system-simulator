<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#07090d" />
  <title>Dynamic System Simulator</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <canvas id="world"></canvas>
  <header class="hud top">
    <div><strong>DSS</strong><span id="stepLabel">STEP 0</span></div>
    <button id="resetBtn">Reset</button>
  </header>
  <aside id="stats" class="panel"></aside>
  <div id="timeline" class="timeline">Waiting for first analysis…</div>
  <section id="sheet" class="sheet hidden">
    <div class="grab"></div>
    <div class="sheet-head"><strong>Intervention</strong><button id="closeSheet">×</button></div>
    <label>P₁ delta <input id="deltaP1" type="range" min="-0.5" max="0.5" value="0.2" step="0.01"><output id="deltaOut">+0.20</output></label>
    <button id="applyIntervention" class="primary">Apply to selected node</button>
  </section>
  <nav class="controls">
    <button id="stepBtn" aria-label="Step">│▶</button>
    <button id="playBtn" class="primary" aria-label="Play pause">▶</button>
    <button id="speedBtn" aria-label="Speed">×1</button>
    <button id="interveneBtn" aria-label="Intervention">±</button>
  </nav>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
